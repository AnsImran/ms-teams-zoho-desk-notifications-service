name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

permissions:
  contents: read
  packages: write                                              # Required to push images to GHCR.

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version-file: .python-version

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --frozen

      - name: Smoke test imports
        run: uv run python -c "import certifi, pytz, requests; from dotenv import load_dotenv; print('imports ok')"

      - name: Compile Python
        run: uv run python -m compileall -q main.py src

      - name: Run tests
        run: uv run --with pytest pytest tests/ -q

  build-and-push:
    name: Build and push images
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push images
        run: |
          docker compose build
          docker compose push

  deploy:
    name: Deploy (container)
    needs: build-and-push
    runs-on: ubuntu-latest
    environment: production
    concurrency:
      group: production-deploy
      cancel-in-progress: true
    steps:
      - name: Validate required secrets
        shell: bash
        run: |
          set -euo pipefail
          test -n "${{ secrets.DEPLOY_HOST }}" || (echo "Missing secret: DEPLOY_HOST" && exit 1)
          test -n "${{ secrets.DEPLOY_USER }}" || (echo "Missing secret: DEPLOY_USER" && exit 1)
          test -n "${{ secrets.DEPLOY_GIT_PATH }}" || (echo "Missing secret: DEPLOY_GIT_PATH" && exit 1)
          test -n "${{ secrets.DEPLOY_SSH_KEY }}" || (echo "Missing secret: DEPLOY_SSH_KEY" && exit 1)
          test -n "${{ secrets.GHCR_USER }}" || (echo "Missing secret: GHCR_USER" && exit 1)
          test -n "${{ secrets.GHCR_TOKEN }}" || (echo "Missing secret: GHCR_TOKEN" && exit 1)

      - name: Configure SSH
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          cat > ~/.ssh/id_ed25519 <<'EOF'
          ${{ secrets.DEPLOY_SSH_KEY }}
          EOF
          chmod 600 ~/.ssh/id_ed25519

          PORT="${{ secrets.DEPLOY_PORT }}"
          if [ -z "$PORT" ]; then PORT="22"; fi
          ssh-keyscan -p "$PORT" -H "${{ secrets.DEPLOY_HOST }}" >> ~/.ssh/known_hosts

      - name: Pull and deploy
        shell: bash
        run: |
          set -euo pipefail
          PORT="${{ secrets.DEPLOY_PORT }}"
          if [ -z "$PORT" ]; then PORT="22"; fi

          DEPLOY_GIT_PATH_B64="$(printf '%s' "${{ secrets.DEPLOY_GIT_PATH }}" | base64 -w0)"
          GHCR_USER_B64="$(printf '%s' "${{ secrets.GHCR_USER }}" | base64 -w0)"
          GHCR_TOKEN_B64="$(printf '%s' "${{ secrets.GHCR_TOKEN }}" | base64 -w0)"

          ssh -p "$PORT" -i ~/.ssh/id_ed25519 "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}" \
            "DEPLOY_GIT_PATH_B64='$DEPLOY_GIT_PATH_B64' GHCR_USER_B64='$GHCR_USER_B64' GHCR_TOKEN_B64='$GHCR_TOKEN_B64' bash -s" <<'EOS'
          set -euo pipefail
          export GIT_TERMINAL_PROMPT=0

          deploy_git_path="$(printf '%s' "$DEPLOY_GIT_PATH_B64" | base64 -d)"
          ghcr_user="$(printf '%s' "$GHCR_USER_B64" | base64 -d)"
          ghcr_token="$(printf '%s' "$GHCR_TOKEN_B64" | base64 -d)"

          cd "$deploy_git_path"

          git fetch --prune origin main
          git checkout main
          git reset --hard origin/main

          echo "$ghcr_token" | docker login ghcr.io -u "$ghcr_user" --password-stdin

          docker compose pull
          docker compose up -d --remove-orphans
          docker image prune -f

          echo "Waiting for services to start..."
          sleep 5
          docker compose ps
          EOS
