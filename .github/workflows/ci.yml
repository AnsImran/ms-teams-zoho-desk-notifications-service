name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version-file: .python-version

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --frozen

      - name: Smoke test imports
        run: uv run python -c "import certifi, pytz, requests; from dotenv import load_dotenv; print('imports ok')"

      - name: Compile Python
        run: uv run python -m compileall -q main.py src

  deploy:
    name: Deploy (auto)
    needs: ci
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: production
    concurrency:
      group: production-deploy
      cancel-in-progress: true
    steps:
      - name: Validate required secrets
        shell: bash
        run: |
          set -euo pipefail
          test -n "${{ secrets.DEPLOY_HOST }}" || (echo "Missing secret: DEPLOY_HOST" && exit 1)
          test -n "${{ secrets.DEPLOY_USER }}" || (echo "Missing secret: DEPLOY_USER" && exit 1)
          test -n "${{ secrets.DEPLOY_GIT_PATH }}" || (echo "Missing secret: DEPLOY_GIT_PATH" && exit 1)
          test -n "${{ secrets.DEPLOY_SSH_KEY }}" || (echo "Missing secret: DEPLOY_SSH_KEY" && exit 1)

      - name: Configure SSH
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          cat > ~/.ssh/id_ed25519 <<'EOF'
          ${{ secrets.DEPLOY_SSH_KEY }}
          EOF
          chmod 600 ~/.ssh/id_ed25519

          PORT="${{ secrets.DEPLOY_PORT }}"
          if [ -z "$PORT" ]; then PORT="22"; fi
          ssh-keyscan -p "$PORT" -H "${{ secrets.DEPLOY_HOST }}" >> ~/.ssh/known_hosts

      - name: Update repo on server (git)
        shell: bash
        run: |
          set -euo pipefail
          PORT="${{ secrets.DEPLOY_PORT }}"
          if [ -z "$PORT" ]; then PORT="22"; fi

          DEPLOY_GIT_PATH_B64="$(printf '%s' "${{ secrets.DEPLOY_GIT_PATH }}" | base64 -w0)"
          DEPLOY_POST_COMMAND_B64=""
          if [ -n "${{ secrets.DEPLOY_POST_COMMAND }}" ]; then
            DEPLOY_POST_COMMAND_B64="$(printf '%s' "${{ secrets.DEPLOY_POST_COMMAND }}" | base64 -w0)"
          fi

          ssh -p "$PORT" -i ~/.ssh/id_ed25519 "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}" \
            "DEPLOY_GIT_PATH_B64='$DEPLOY_GIT_PATH_B64' DEPLOY_POST_COMMAND_B64='$DEPLOY_POST_COMMAND_B64' bash -s" <<'EOS'
          set -euo pipefail
          export GIT_TERMINAL_PROMPT=0

          deploy_git_path="$(printf '%s' "$DEPLOY_GIT_PATH_B64" | base64 -d)"
          if [ -z "$deploy_git_path" ]; then
            echo "DEPLOY_GIT_PATH is empty"
            exit 1
          fi

          cd "$deploy_git_path"
          git rev-parse --is-inside-work-tree >/dev/null
          git fetch --prune origin main
          git checkout main
          git reset --hard origin/main

          if [ -n "${DEPLOY_POST_COMMAND_B64:-}" ]; then
            post_command="$(printf '%s' "$DEPLOY_POST_COMMAND_B64" | base64 -d)"
            if [ -n "$post_command" ]; then
              bash -lc "$post_command"
            fi
          fi
          EOS
