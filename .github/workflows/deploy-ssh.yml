name: Deploy (SSH)

on:
  workflow_dispatch:
    inputs:
      local_path:
        description: Local folder to deploy (relative to repo root)
        required: true
        default: src/superstat_cron
      dry_run:
        description: If true, rsync runs in --dry-run mode
        type: boolean
        required: true
        default: true
      delete_extra:
        description: If true, rsync deletes remote files not present locally
        type: boolean
        required: true
        default: false

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Validate inputs
        shell: bash
        run: |
          set -euo pipefail
          if [ ! -d "${{ inputs.local_path }}" ]; then
            echo "local_path must be an existing directory. Got: ${{ inputs.local_path }}"
            exit 1
          fi

      - name: Validate required secrets
        shell: bash
        run: |
          set -euo pipefail
          test -n "${{ secrets.DEPLOY_HOST }}" || (echo "Missing secret: DEPLOY_HOST" && exit 1)
          test -n "${{ secrets.DEPLOY_USER }}" || (echo "Missing secret: DEPLOY_USER" && exit 1)
          test -n "${{ secrets.DEPLOY_REMOTE_PATH }}" || (echo "Missing secret: DEPLOY_REMOTE_PATH" && exit 1)
          test -n "${{ secrets.DEPLOY_SSH_KEY }}" || (echo "Missing secret: DEPLOY_SSH_KEY" && exit 1)

      - name: Configure SSH
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          cat > ~/.ssh/id_ed25519 <<'EOF'
          ${{ secrets.DEPLOY_SSH_KEY }}
          EOF
          chmod 600 ~/.ssh/id_ed25519

          PORT="${{ secrets.DEPLOY_PORT }}"
          if [ -z "$PORT" ]; then PORT="22"; fi

          ssh-keyscan -p "$PORT" -H "${{ secrets.DEPLOY_HOST }}" >> ~/.ssh/known_hosts

      - name: Rsync to server
        shell: bash
        run: |
          set -euo pipefail
          PORT="${{ secrets.DEPLOY_PORT }}"
          if [ -z "$PORT" ]; then PORT="22"; fi

          DRY=""
          if [ "${{ inputs.dry_run }}" = "true" ]; then DRY="--dry-run"; fi

          DELETE=""
          if [ "${{ inputs.delete_extra }}" = "true" ]; then DELETE="--delete"; fi

          rsync -avz $DRY $DELETE \
            -e "ssh -p $PORT -i ~/.ssh/id_ed25519" \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='.venv' \
            --exclude='**/__pycache__' \
            --exclude='**/.ipynb_checkpoints' \
            --exclude='.env' \
            --exclude='seen_superstat_ticket_ids.json' \
            "${{ inputs.local_path }}/" \
            "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:${{ secrets.DEPLOY_REMOTE_PATH }}/"

      - name: Post-deploy command (optional)
        shell: bash
        run: |
          set -euo pipefail
          PORT="${{ secrets.DEPLOY_PORT }}"
          if [ -z "$PORT" ]; then PORT="22"; fi

          if [ "${{ inputs.dry_run }}" = "true" ]; then
            echo "Skipping post command because dry_run=true"
            exit 0
          fi

          if [ -z "${{ secrets.DEPLOY_POST_COMMAND }}" ]; then
            echo "Skipping post command because DEPLOY_POST_COMMAND is empty"
            exit 0
          fi

          ssh -p "$PORT" -i ~/.ssh/id_ed25519 "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}" "${{ secrets.DEPLOY_POST_COMMAND }}"
