services:
  notification-service:
    image: ghcr.io/ansimran/teams-notifications-service/notification-service:latest
    build:
      context: .
      dockerfile: Dockerfile.notification
    container_name: notification-service
    env_file: .env
    environment:
      TOKEN_SERVICE_URL:  http://token-service:8000           # Reach token-service via shared Docker network.
      PRODUCTS_JSON_PATH: /app/config/products.json           # Products config on shared volume.
      LOG_LEVEL:          INFO                                # Structured log level (DEBUG, INFO, WARNING, ERROR).
      LOG_DIR:            /app/logs                            # Directory for rotating JSON log files.
    volumes:
      - shared-config:/app/config                             # Shared config volume for products.json.
      - notification-logs:/app/logs                           # Persistent structured log files.
    networks:
      - zoho-token-service_default                            # Join the token service's network so DNS resolves.
    restart: unless-stopped

  dashboard:
    image: ghcr.io/ansimran/teams-notifications-service/dashboard:latest
    build:
      context: .
      dockerfile: Dockerfile.dashboard
    container_name: dashboard
    env_file: .env
    environment:
      TOKEN_SERVICE_URL:  http://token-service:8000           # Reach token-service for ticket queries.
      PRODUCTS_JSON_PATH: /app/config/products.json           # Read/write products config on shared volume.
      LOG_LEVEL:          INFO                                # Structured log level (DEBUG, INFO, WARNING, ERROR).
      LOG_DIR:            /app/logs                            # Directory for rotating JSON log files.
    ports:
      - "8501:8501"                                           # Expose Streamlit dashboard to the internet.
    volumes:
      - shared-config:/app/config                             # Shared config volume for products.json.
      - /var/run/docker.sock:/var/run/docker.sock             # Docker socket for notification-service status checks.
      - dashboard-logs:/app/logs                              # Persistent logs that survive container rebuilds.
      - ./.streamlit/secrets.toml:/app/.streamlit/secrets.toml:ro  # Streamlit auth credentials (host file, read-only).
    networks:
      - zoho-token-service_default                            # Join token service network for Zoho API access.
    restart: unless-stopped

volumes:
  shared-config:                                              # Named volume for products.json (shared between services).
  dashboard-logs:                                             # Persistent log storage for the dashboard.
  notification-logs:                                          # Persistent structured log files for the notification service.

networks:
  zoho-token-service_default:
    external: true                                            # Created by the zoho-token-service compose stack.
